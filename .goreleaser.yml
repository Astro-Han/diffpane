version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s
      - -w

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: Astro-Han
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Astro-Han/diffpane"
    description: "Real-time TUI diff viewer for AI coding agents"
    license: "MIT"

release:
  github:
    owner: Astro-Han
    name: diffpane
